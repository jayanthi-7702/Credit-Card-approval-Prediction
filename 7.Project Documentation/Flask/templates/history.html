<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction History</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
    margin:0;
}

.container{

    width:90%;
    margin:30px auto;

    background:white;

    padding:20px;

    border-radius:10px;

    box-shadow:0 0 12px rgba(0,0,0,.2);

}

h1{

    text-align:center;
    color:#0b5394;

}

table{

    width:100%;
    border-collapse:collapse;

}

th{

    background:#0b5394;
    color:white;
    padding:12px;

}

td{

    text-align:center;
    padding:10px;
    border-bottom:1px solid #ddd;

}

tr:hover{

    background:#f5f5f5;

}

button{

    margin-top:20px;
    padding:10px 20px;

    background:#0b5394;

    color:white;

    border:none;

    border-radius:6px;

    cursor:pointer;

}

button:hover{

    background:#073763;

}

</style>

</head>

<body>

<div class="container">

<h1>Prediction History</h1>

<table>

<tr>

<th>Applicant ID</th>

<th>Prediction</th>

<th>Risk Level</th>

<th>Date & Time</th>

</tr>

{% for row in rows %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[1] }}</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }}</td>

</tr>

{% endfor %}

</table>

<center>

<a href="/">
    <button>
        Back to Prediction
    </button>
</a>

<br><br>

<a href="/download">
    <button>
        📥 Download CSV Report
    </button>
</a>

</center>

</div>

</body>

</html>
