<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credit Card Approval Prediction</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
    margin:0;
}

.container{
    width:700px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#0b5394;
}

label{
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:10px;
    margin:6px 0 16px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#0b5394;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#073763;
}

.result{
    margin-top:20px;
    background:#f5f5f5;
    padding:15px;
    border-radius:8px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Credit Card Approval Prediction</h1>

<form action="/predict" method="POST">

<label>Gender</label>
<select name="gender" required>
    <option value="1">Male</option>
    <option value="0">Female</option>
</select>

<label>Own Car</label>
<select name="car" required>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Own House / Realty</label>
<select name="realty" required>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Number of Children</label>
<input type="number" name="children" required>

<label>Annual Income</label>
<input type="number" name="income" required>

<label>Income Type</label>
<select name="income_type" required>
    <option value="4">Working</option>
    <option value="0">Commercial Associate</option>
    <option value="2">State Servant</option>
    <option value="1">Pensioner</option>
    <option value="3">Student</option>
</select>

<label>Education</label>
<select name="education" required>
    <option value="1">Higher Education</option>
    <option value="4">Secondary / Secondary Special</option>
    <option value="2">Incomplete Higher</option>
    <option value="3">Lower Secondary</option>
    <option value="0">Academic Degree</option>
</select>

<label>Family Status</label>
<select name="family" required>
    <option value="1">Married</option>
    <option value="0">Civil Marriage</option>
    <option value="3">Single / Not Married</option>
    <option value="2">Separated</option>
    <option value="4">Widow</option>
</select>

<label>Housing Type</label>
<select name="housing" required>
    <option value="1">House / Apartment</option>
    <option value="4">Rented Apartment</option>
    <option value="5">With Parents</option>
    <option value="2">Municipal Apartment</option>
    <option value="3">Office Apartment</option>
    <option value="0">Co-op Apartment</option>
</select>

<label>Age (Years)</label>
<input type="number" name="age" required>

<label>Years of Experience</label>
<input type="number" name="experience" required>

<label>Has Mobile</label>
<select name="mobile" required>
    <option value="1">Yes</option>
</select>

<label>Has Email</label>
<select name="email" required>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Occupation</label>
<select name="occupation" required>
    <option value="0">Accountants</option>
    <option value="1">Cleaning Staff</option>
    <option value="2">Cooking Staff</option>
    <option value="3">Core Staff</option>
    <option value="4">Drivers</option>
    <option value="5">HR Staff</option>
    <option value="6">High Skill Tech Staff</option>
    <option value="7">IT Staff</option>
    <option value="8">Laborers</option>
    <option value="9">Managers</option>
    <option value="10">Medicine Staff</option>
    <option value="11">Private Service Staff</option>
    <option value="12">Realty Agents</option>
    <option value="13">Sales Staff</option>
    <option value="14">Secretaries</option>
    <option value="15">Security Staff</option>
    <option value="16">Waiters / Barmen Staff</option>
    <option value="17">Unknown</option>
    <option value="18">Other</option>
</select>

<label>Family Members</label>
<input type="number" step="0.1" name="family_members" required>

<button type="submit">
Predict Approval
</button></form>

{% if prediction %}

<div class="result">

<h2>{{ prediction }}</h2>

<p><strong>{{ confidence }}</strong></p>

<p><strong>{{ risk }}</strong></p>

<br>

<a href="/history">
    <button type="button">
        📄 View Prediction History
    </button>
</a>

<br><br>

<a href="/dashboard">
    <button type="button">
        📊 View Dashboard
    </button>
</a>

{% endif %}

</div>

</body>

</html>
